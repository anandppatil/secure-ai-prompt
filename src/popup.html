<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --bg: #101623; --panel: #161e30; --line: #232e48;
      --text: #e8ecf4; --dim: #9aa7c0; --accent: #3a6df0;
      --red: #ff8a8a; --amber: #f2c464; --green: #7dd3a0;
    }
    body {
      width: 300px; margin: 0; padding: 16px;
      background: var(--bg); color: var(--text);
      font: 13px/1.45 ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--green); }
    .dot.off { background: #55607a; }
    h1 { font-size: 14px; margin: 0; font-weight: 700; }
    .sub { color: var(--dim); font-size: 11.5px; margin-bottom: 14px; }
    .row {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 9px; padding: 10px 12px; margin-bottom: 8px;
    }
    .stat { font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat.red { color: var(--red); } .stat.amber { color: var(--amber); } .stat.green { color: var(--green); }
    label.switch { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
    input[type="checkbox"] { width: 34px; height: 18px; accent-color: var(--accent); cursor: pointer; }
    a.opts {
      display: block; text-align: center; margin-top: 10px;
      color: var(--dim); font-size: 12px; text-decoration: none;
    }
    a.opts:hover { color: var(--text); }
    .managed { margin-top: 8px; font-size: 11px; color: var(--amber); display: none; }
  </style>
</head>
<body>
  <header>
    <span class="dot" id="statusDot"></span>
    <h1>Secure AI Prompt</h1>
  </header>
  <div class="sub">Prompts are scanned locally in this browser. Nothing is sent anywhere.</div>

  <div class="row">
    <label class="switch">
      <input type="checkbox" id="enabledToggle" />
      <span>Protection enabled</span>
    </label>
  </div>

  <div class="row"><span>Warnings shown</span><span class="stat amber" id="statIntercepted">0</span></div>
  <div class="row"><span>Auto-redactions</span><span class="stat green" id="statRedacted">0</span></div>
  <div class="row"><span>Overrides (sent anyway)</span><span class="stat red" id="statOverridden">0</span></div>

  <div class="managed" id="managedNote">⚙ Some settings are managed by your organization.</div>
  <a href="#" class="opts" id="openOptions">Settings &amp; custom rules →</a>

  <script src="popup.js"></script>
</body>
</html>
