<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>shadow fixture</title>
<style>body{font-family:system-ui;padding:40px}</style>
</head>
<body>
  <div id="host"></div>
  <div id="sent-log" data-sent="0"></div>
  <script>
    // Create a CLOSED shadow root and put the editor inside it. Without the
    // main-world attachShadow patch, the content script cannot see this editor.
    const host = document.getElementById('host');
    const log = document.getElementById('sent-log');
    const root = host.attachShadow({ mode: 'closed' });
    root.innerHTML =
      '<style>.ql-editor{min-height:100px;border:1px solid #ccc;padding:10px;font:14px monospace;white-space:pre-wrap}</style>' +
      '<div class="ql-editor" contenteditable="true" role="textbox"></div>' +
      '<button aria-label="Send message">Send</button>';
    const ed = root.querySelector('.ql-editor');
    const btn = root.querySelector('button');
    function doSend() {
      const n = Number(log.dataset.sent) + 1;
      log.dataset.sent = String(n);
      log.textContent = 'SENT:' + ed.innerText;
    }
    btn.addEventListener('click', doSend);
    ed.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
    }, true);
    // Expose whether the root ended up open (patch worked) for the test to read.
    window.__shadowMode = host.shadowRoot ? 'open' : 'closed';
  </script>
</body>
</html>
